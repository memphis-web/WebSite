<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>響應式觸控賽車遊戲</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #333;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 遊戲容器：限制最大寬度以維持視覺比例 */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 600px; /* 適合手機直式或電腦版窄視窗 */
            background-color: #111;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* 觸控虛擬按鈕（僅在行動裝置或需要時顯示） */
        #touch-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none; /* 讓容器不阻擋點擊，但子元素可點擊 */
        }
        .ctrl-btn {
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.3);
            border: 2px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto; /* 啟用按鈕點擊 */
            touch-action: manipulation; /* 優化觸控延遲 */
        }
        .ctrl-btn:active {
            background-color: rgba(255, 255, 255, 0.6);
        }
        /* 遊戲結束與計分畫面 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        #start-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="touch-controls">
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>

        <div id="overlay">
            <h1 id="game-title">街頭飆車魂</h1>
            <p id="game-score-text">使用左右鍵或下方按鈕閃避障礙物</p>
            <button id="start-btn">開始遊戲</button>
        </div>
    </div>

const gameScoreText = document.getElementById('game-score-text');

let gameActive = false;
let score = 0;
let speed = 5;
let animationFrameId;
